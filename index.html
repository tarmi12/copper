<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle Metal Hub - Enterprise</title>
    <!-- Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons สำหรับไอคอนสวยๆ -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .active-tab { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .sidebar-item { transition: all 0.2s; cursor: pointer; }
        .sidebar-item:hover:not(.active-tab) { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- ระบบแจ้งเตือน Toasts สวยงาม (มาแทน alert) -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <div id="app" class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0 border-r border-slate-800">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg shadow-blue-500/30">
                        <i data-lucide="recycle" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg text-white leading-none">MetalHub</h1>
                        <span class="text-blue-400 text-[10px] font-bold tracking-wider uppercase block mt-1">ENTERPRISE Q2</span>
                    </div>
                </div>

                <nav id="nav-menu" class="space-y-1.5">
                    <!-- เมนูจะแสดงตามสิทธิ์จริงด้วย JavaScript -->
                </nav>
            </div>

            <!-- ส่วนล่างสำหรับสลับผู้ใช้งานจำลอง (RBAC) -->
            <div class="mt-auto p-6 border-t border-slate-800/80 bg-slate-950/40">
                <div class="bg-slate-800/60 p-4 rounded-2xl border border-slate-700/50">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">บัญชีผู้ใช้ปัจจุบัน</p>
                    </div>
                    <select id="role-selector" class="bg-transparent text-sm w-full outline-none cursor-pointer text-blue-400 font-bold" onchange="changeRole(this.value)">
                        <option value="owner" class="bg-slate-800 text-white">Owner (เจ้าของร้าน)</option>
                        <option value="office_admin" class="bg-slate-800 text-white">Office Admin (เสมียน)</option>
                        <option value="yard_foreman" class="bg-slate-800 text-white">Yard Foreman (หน้าลาน)</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-h-screen overflow-y-auto">
            <!-- Topbar แสดงบทบาทปัจจุบัน -->
            <header class="bg-white border-b border-slate-200/80 px-8 py-4 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <span class="text-xs bg-slate-100 px-3 py-1.5 rounded-full font-bold text-slate-600 flex items-center gap-1">
                        <i data-lucide="shield-alert" class="w-3.5 h-3.5 text-blue-500"></i> สิทธิ์: 
                        <span id="role-display-badge" class="text-blue-600 font-bold uppercase">Owner</span>
                    </span>
                    <span id="db-status-badge" class="text-xs bg-emerald-50 px-3 py-1.5 rounded-full font-bold text-emerald-600 flex items-center gap-1">
                        <i data-lucide="database" class="w-3.5 h-3.5"></i> Supabase Connected
                    </span>
                </div>
                <div class="text-sm font-semibold text-slate-500" id="current-time-display"></div>
            </header>

            <div class="p-8 flex-1">
                <div id="content-area" class="max-w-6xl mx-auto space-y-6">
                    <!-- เนื้อหาของแต่ละเมนูจะถูกนำมาวางที่นี่ -->
                </div>
            </div>
        </main>
    </div>

    <!-- มอดอล (กล่องป๊อปอัพขึ้นมาบนหน้าจอ) -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div id="modal-content" class="bg-white rounded-3xl max-w-lg w-full shadow-2xl overflow-hidden border border-slate-100 transform scale-95 transition-all duration-300">
            <!-- เนื้อหาในมอดอล -->
        </div>
    </div>

    <script>
        // บัญชีเชื่อมต่อ Supabase ที่คุณตั้งค่าไว้
        const SUPABASE_URL = 'https://nitjrufyhmgkmzgoufiw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lGSoBw5mz9Rdtdl3ecYHwA_9mwIfiwf';
        
        let supabaseClientReady = false;
        let supabase;

        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            supabaseClientReady = true;
        } catch (e) {
            console.warn("ไม่สามารถเริ่มระบบเชื่อมต่อกับ Supabase ได้ กำลังใช้โหมดออฟไลน์จำลองเพื่อการทดสอบแทน", e);
        }

        // ตัวแปรเก็บข้อมูลภายในเครื่อง (กรณีไม่มีในระบบหรือดึงค่าล้มเหลว)
        let lots = [
            { id: 1, lot_id: 'LOT-20240520-001', date: '2026-05-20', sku: 'อลูมิเนียมอัด', grade: 'A', net_weight: 1250.0, package_type: 'ถุง Big Bag', asset_id: 'BAG-001', evidence_url: 'https://via.placeholder.com/300?text=Scale+Evidence+1', status: 'In-Stock', created_by: 'yard_foreman' },
            { id: 2, lot_id: 'LOT-20240520-002', date: '2026-05-20', sku: 'ทองแดงสายไฟ', grade: 'A', net_weight: 840.5, package_type: 'พาเลทไม้', asset_id: 'PLT-012', evidence_url: '', status: 'In-Stock', created_by: 'yard_foreman' },
            { id: 3, lot_id: 'LOT-20240519-001', date: '2026-05-19', sku: 'อลูมิเนียมอัด', grade: 'B', net_weight: 980.0, package_type: 'ถุง Big Bag', asset_id: 'BAG-002', evidence_url: 'https://via.placeholder.com/300?text=Scale+Evidence+2', status: 'Shipped', created_by: 'yard_foreman' }
        ];

        let summaries = [
            { id: 1, date: '2026-05-20', sku: 'อลูมิเนียมอัด', grade: 'A', total_weight: 1300.0, created_by: 'office_admin' },
            { id: 2, date: '2026-05-20', sku: 'ทองแดงสายไฟ', grade: 'A', total_weight: 850.0, created_by: 'office_admin' },
            { id: 3, date: '2026-05-19', sku: 'อลูมิเนียมอัด', grade: 'B', total_weight: 1000.0, created_by: 'office_admin' }
        ];

        let assets = [
            { id: 'plt_empty', type: 'พาเลท', sub_type: 'พาเลทไม้มาตรฐาน', available_qty: 45, in_use_qty: 12, at_customer_qty: 8 },
            { id: 'bag_empty', type: 'ถุงกรอง', sub_type: 'ถุง Big Bag 1 ตัน', available_qty: 120, in_use_qty: 35, at_customer_qty: 0 }
        ];

        let auditLogs = [
            { id: 1, user_id: 'yard_foreman', action: 'CREATE_LOT', metadata: 'สร้าง Lot สินค้าใหม่ LOT-20240520-002', timestamp: '2026-05-20T10:14:00Z' },
            { id: 2, user_id: 'office_admin', action: 'ADD_SUMMARY', metadata: 'บันทึกยอดชั่งซื้อหน้าร้าน ทองแดงสายไฟ 850 kg', timestamp: '2026-05-20T09:30:00Z' }
        ];

        let currentRole = 'owner';
        let activeTab = 'dashboard';

        // แสดงความแจ้งเตือน Toast บนจอ
        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = 'check-circle2';
            let bgClass = 'bg-white border-emerald-200 text-slate-800';
            let iconColor = 'text-emerald-500';
            
            if (type === 'error') {
                icon = 'alert-triangle';
                bgClass = 'bg-red-50 border-red-200 text-slate-800';
                iconColor = 'text-red-500';
            } else if (type === 'warning') {
                icon = 'help-circle';
                bgClass = 'bg-amber-50 border-amber-200 text-slate-800';
                iconColor = 'text-amber-500';
            }

            toast.className = `flex items-start gap-3 p-4 rounded-2xl border shadow-lg ${bgClass} transition duration-300 max-w-sm w-80 transform translate-x-10 opacity-0`;
            toast.innerHTML = `
                <div class="shrink-0 ${iconColor} mt-0.5">
                    <i data-lucide="${icon}"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm">${title}</h4>
                    <p class="text-xs text-slate-500 mt-1">${message}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('translate-x-10', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('translate-x-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // จัดการเปิด/ปิด PopUp Modal
        function openModal(contentHtml) {
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.innerHTML = contentHtml;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal-container');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        // ฟังก์ชันดึงข้อมูลจาก Supabase
        async function fetchData() {
            if (!supabaseClientReady) {
                render();
                return;
            }

            try {
                // ดึงรายการ Lot
                const { data: lotData, error: lotError } = await supabase
                    .from('packed_lots')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (!lotError && lotData && lotData.length > 0) {
                    lots = lotData;
                }

                // ดึงยอดสรุปรายวัน
                const { data: sumData, error: sumError } = await supabase
                    .from('daily_summaries')
                    .select('*');
                
                if (!sumError && sumData && sumData.length > 0) {
                    summaries = sumData;
                }

                // ดึงประวัติ Audit Logs
                const { data: logData, error: logError } = await supabase
                    .from('audit_logs')
                    .select('*')
                    .order('timestamp', { ascending: false });
                
                if (!logError && logData && logData.length > 0) {
                    auditLogs = logData;
                }

                document.getElementById('db-status-badge').innerHTML = `
                    <i data-lucide="database" class="w-3.5 h-3.5 text-emerald-500"></i> ดึงข้อมูลจากระบบจริงสำเร็จ
                `;
                document.getElementById('db-status-badge').className = "text-xs bg-emerald-50 px-3 py-1.5 rounded-full font-bold text-emerald-600 flex items-center gap-1";
                render();
            } catch (err) {
                console.warn("ไม่สามารถดึงข้อมูลแบบ Realtime จาก Supabase ได้ กำลังรันแอปบนข้อมูลจำลองสำรอง", err);
                document.getElementById('db-status-badge').innerHTML = `
                    <i data-lucide="database-zap" class="w-3.5 h-3.5 text-amber-500"></i> กำลังใช้ออฟไลน์จำลอง (Demo Mode)
                `;
                document.getElementById('db-status-badge').className = "text-xs bg-amber-50 px-3 py-1.5 rounded-full font-bold text-amber-600 flex items-center gap-1";
                render();
            }
        }

        // บันทึกกิจกรรมที่เกิดขึ้นลงระบบ (Audit Log)
        async function logActivity(action, metadata) {
            const newLog = {
                user_id: currentRole,
                action: action,
                metadata: typeof metadata === 'object' ? JSON.stringify(metadata) : metadata,
                timestamp: new Date().toISOString()
            };

            auditLogs.unshift(newLog);

            if (supabaseClientReady) {
                try {
                    await supabase.from('audit_logs').insert([newLog]);
                } catch(e) {
                    console.log("เซฟ Log ลงฐานข้อมูลภายนอกไม่ได้ (Demo Mode)");
                }
            }
        }

        // ฟังก์ชันวาดหน้าจอ (Render)
        function render() {
            renderNav();
            renderContent();
            lucide.createIcons(); // โหลดไอคอนใหม่
            document.getElementById('role-display-badge').innerText = currentRole;
        }

        function renderNav() {
            const menu = [
                { id: 'dashboard', label: 'ภาพรวมของร้าน', icon: 'layout-dashboard', roles: ['owner', 'office_admin', 'yard_foreman'] },
                { id: 'inbound', label: 'บันทึกซื้อหน้าร้าน', icon: 'clipboard-list', roles: ['owner', 'office_admin'] },
                { id: 'processing', label: 'งานหน้าลานแปรรูป', icon: 'package', roles: ['owner', 'yard_foreman'] },
                { id: 'outbound', label: 'สแกนขนออกขาย', icon: 'qr-code', roles: ['owner', 'office_admin'] },
                { id: 'assets', label: 'สต๊อกพาเลท / ถุง', icon: 'container', roles: ['owner', 'yard_foreman', 'office_admin'] },
                { id: 'logs', label: 'ประวัติความปลอดภัย', icon: 'history', roles: ['owner'] },
            ];

            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = menu
                .filter(m => m.roles.includes(currentRole))
                .map(m => `
                    <div onclick="setTab('${m.id}')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition font-semibold text-sm ${activeTab === m.id ? 'active-tab' : 'text-slate-400'}">
                        <i data-lucide="${m.icon}" class="w-5 h-5"></i> ${m.label}
                    </div>
                `).join('');
        }

        function renderContent() {
            const container = document.getElementById('content-area');
            
            // หน้า 1: EXECUTIVE DASHBOARD
            if (activeTab === 'dashboard') {
                const totalBuy = summaries.reduce((s, i) => s + Number(i.total_weight || 0), 0);
                const totalPacked = lots.reduce((s, i) => s + Number(i.net_weight || 0), 0);
                const lossWeight = Math.max(0, totalBuy - totalPacked);
                const lossPercent = totalBuy > 0 ? (lossWeight / totalBuy) * 100 : 0;
                const isLossAlert = lossPercent > 5;

                container.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                        <div>
                            <h2 class="text-3xl font-bold tracking-tight text-slate-900">แผงควบคุมหลัก (Dashboard)</h2>
                            <p class="text-slate-500 text-sm mt-1">วิเคราะห์ความต่างน้ำหนักซื้อเข้าหน้าร้าน เทียบกับการผลิตบรรจุถุง</p>
                        </div>
                        <button onclick="fetchData()" class="flex items-center gap-2 bg-white hover:bg-slate-100 text-slate-700 px-4 py-2.5 rounded-2xl border text-sm font-bold shadow-sm transition">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> รีเฟรชข้อมูลล่าสุด
                        </button>
                    </div>

                    ${isLossAlert ? `
                    <div class="bg-red-50 border-2 border-red-200 p-4 rounded-3xl flex items-start gap-3.5 text-red-800 shadow-sm animate-bounce">
                        <i data-lucide="alert-triangle" class="w-6 h-6 shrink-0 mt-0.5 text-red-600"></i>
                        <div>
                            <h4 class="font-bold text-base leading-tight">⚠️ พบยอดสูญเสียน้ำหนัก (Loss) สูงเกิน 5%!</h4>
                            <p class="text-sm text-red-700/90 mt-1">น้ำหนักชั่งรวมตอนซื้อ มากกว่าน้ำหนักคัดลานแพ็คจริงถึง ${lossPercent.toFixed(2)}% ซึ่งพ้นขอบเขตปกติ โปรดตรวจสอบความโปร่งใสหน้าลานเครื่องชั่ง</p>
                        </div>
                    </div>
                    ` : ''}

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60 flex items-center justify-between">
                            <div>
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">ยอดน้ำหนักซื้อเข้า</p>
                                <h3 class="text-3xl font-black text-slate-800">${totalBuy.toLocaleString()} kg</h3>
                            </div>
                            <div class="bg-blue-50 p-3 rounded-2xl text-blue-600"><i data-lucide="arrow-down-left"></i></div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60 flex items-center justify-between">
                            <div>
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">น้ำหนักแปรรูปแพ็คเสร็จ</p>
                                <h3 class="text-3xl font-black text-slate-800">${totalPacked.toLocaleString()} kg</h3>
                            </div>
                            <div class="bg-emerald-50 p-3 rounded-2xl text-emerald-600"><i data-lucide="box"></i></div>
                        </div>
                        <div class="p-6 rounded-3xl shadow-sm border flex items-center justify-between ${isLossAlert ? 'bg-red-50/60 border-red-200' : 'bg-white border-slate-200/60'}">
                            <div>
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">ผลต่างความสูญเสีย</p>
                                <h3 class="text-3xl font-black ${isLossAlert ? 'text-red-600' : 'text-slate-800'}">${lossWeight.toLocaleString()} kg</h3>
                            </div>
                            <div class="p-3 rounded-2xl ${isLossAlert ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-600'}"><i data-lucide="trending-up"></i></div>
                        </div>
                        <div class="p-6 rounded-3xl shadow-sm text-white flex items-center justify-between ${isLossAlert ? 'bg-red-600 shadow-red-500/20' : 'bg-blue-600 shadow-blue-500/20'}">
                            <div>
                                <p class="opacity-80 text-xs font-bold uppercase tracking-wider mb-1">% สูญเสียสะสม</p>
                                <h3 class="text-3xl font-black">${lossPercent.toFixed(2)}%</h3>
                            </div>
                            <div class="bg-white/10 p-3 rounded-2xl text-white"><i data-lucide="percent"></i></div>
                        </div>
                    </div>

                    <!-- ตารางรายการความเคลื่อนไหวล่าสุด -->
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200/60 overflow-hidden">
                        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                            <h3 class="font-bold text-slate-800">ล็อตสินค้าคลังล่าสุด (5 อันดับแรก)</h3>
                            <span class="text-xs bg-blue-100 text-blue-800 font-bold px-3 py-1.5 rounded-full">อัปเดตแบบ Realtime</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-100/70 text-[11px] font-bold uppercase text-slate-500 tracking-wider">
                                    <tr>
                                        <th class="px-6 py-4">รหัสสินค้า Lot ID</th>
                                        <th class="px-6 py-4">ชนิดสินค้า</th>
                                        <th class="px-6 py-4">เกรด</th>
                                        <th class="px-6 py-4">น้ำหนักสุทธิ</th>
                                        <th class="px-6 py-4">อุปกรณ์บรรจุ</th>
                                        <th class="px-6 py-4">สถานะสต๊อก</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-sm">
                                    ${lots.slice(0, 5).map(l => `
                                        <tr class="hover:bg-slate-50/50 transition duration-150">
                                            <td class="px-6 py-4 font-bold text-blue-600 flex items-center gap-2">
                                                <i data-lucide="hash" class="w-4 h-4 opacity-55"></i>${l.lot_id}
                                            </td>
                                            <td class="px-6 py-4 font-semibold text-slate-700">${l.sku}</td>
                                            <td class="px-6 py-4"><span class="px-2 py-1 bg-slate-100 rounded text-xs font-bold">${l.grade}</span></td>
                                            <td class="px-6 py-4 font-bold text-slate-900">${Number(l.net_weight).toLocaleString()} kg</td>
                                            <td class="px-6 py-4 text-slate-500">${l.package_type} <span class="text-xs text-slate-400 font-mono">(${l.asset_id})</span></td>
                                            <td class="px-6 py-4">

        async function saveDailySummary() {
            const sku = document.getElementById('sum-sku').value;
            const grade = document.getElementById('sum-grade').value;
            const weight = parseFloat(document.getElementById('sum-weight').value);

            if (!weight || weight <= 0) {
                showToast("ข้อมูลไม่ครบถ้วน", "กรุณาระบุน้ำหนักชั่งซื้อที่ถูกต้อง", "error");
                return;
            }

            const newSummary = {
                date: new Date().toISOString().split('T')[0],
                sku: sku,
                grade: grade,
                total_weight: weight,
                created_by: currentRole
            };

            summaries.push(newSummary);

            if (supabaseClientReady) {
                try {
                    await supabase.from('daily_summaries').insert([newSummary]);
                } catch(e) {
                    console.warn("ไม่สามารถอัปเดตข้อมูลขึ้น Supabase ได้ ดำเนินการโหมดจำลอง");
                }
            }

            logActivity('ADD_SUMMARY', `ลงบันทึกยอดรับซื้อสินค้า ${sku} เกรด ${grade} น้ำหนัก ${weight} kg`);
            showToast("บันทึกสำเร็จ", `ลงยอดซื้อประจำวัน ${sku} เกรด ${grade} จำนวน ${weight} kg เรียบร้อยแล้ว`);
            closeModal();
            render();
        }

                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">อุปกรณ์บรรจุ</label>
                                <select id="lot-package" class="w-full border-2 p-3 rounded-xl text-sm font-semibold focus:border-blue-500 outline-none bg-slate-50">
                                    <option value="ถุง Big Bag">ถุง Big Bag</option>
                                    <option value="พาเลทไม้">พาเลทไม้</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">น้ำหนักชั่งหน้าเครื่อง (kg)</label>
                                <input id="lot-weight" type="number" placeholder="เช่น 550.5" class="w-full border-2 p-3 rounded-xl text-sm font-semibold focus:border-blue-500 outline-none bg-slate-50">
                            </div>
                        </div>

                        <div class="flex gap-2 pt-4 border-t">
                            <button onclick="closeModal()" class="flex-1 border-2 py-3 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">ยกเลิก</button>
                            <button onclick="savePackedLot()" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl text-sm font-bold text-white shadow-lg">คลุมซีลผลิตเสร็จ</button>
                        </div>
                    </div>
                </div>
            `);
        }

        async function savePackedLot() {
            const lotId = document.getElementById('lot-id-input').value;
            const sku = document.getElementById('lot-sku').value;
            const grade = document.getElementById('lot-grade').value;
            const pkg = document.getElementById('lot-package').value;
            const weight = parseFloat(document.getElementById('lot-weight').value);
            const assetPrefix = pkg === 'ถุง Big Bag' ? 'BAG' : 'PLT';
            const assetId = `${assetPrefix}-${Math.floor(100 + Math.random() * 900)}`;

            if (!weight || weight <= 0) {
                showToast("น้ำหนักว่างเปล่า", "กรุณาระบุน้ำหนักชั่งของ Lot นี้ด้วยครับ", "error");
                return;
            }

            const newLot = {
                id: lots.length + 1,
                lot_id: lotId,
                date: new Date().toISOString().split('T')[0],
                sku: sku,
                grade: grade,
                net_weight: weight,
                package_type: pkg,
                asset_id: assetId,
                evidence_url: '',
                status: 'In-Stock',
                created_by: currentRole
            };

            lots.unshift(newLot);

            // อัปเดตตารางสินทรัพย์ (ตัดลดสต๊อกพร้อมใช้งาน และเข้าสู่กระบวนการแพ็ค)
            const assetIndex = pkg === 'ถุง Big Bag' ? 1 : 0;
            if (assets[assetIndex].available_qty > 0) {
                assets[assetIndex].available_qty--;
                assets[assetIndex].in_use_qty++;
            }

            if (supabaseClientReady) {
                try {
                    await supabase.from('packed_lots').insert([newLot]);
                } catch(e) {
                    console.warn("ไม่สามารถบันทึกขึ้นระบบ Supabase คลาวด์ภายนอกได้ ดำเนินการบันทึกเครื่องจำลองภายในแทน");
                }
            }

            logActivity('CREATE_LOT', `ผลิตแพ็คสินค้าสำเร็จ Lot ${lotId} (${sku}) น้ำหนักสุทธิ ${weight} kg`);
            closeModal();
            render();
            
            // เปิดพรีวิวหน้าจอใบสลิปชั่งน้ำหนักให้ทันทีหลังจากปิดซีล
            printThermalSlip(lotId);
        }

        // จำลองใบสลิปขนาด 80x80 ที่ติดตั้ง QR CODE
        function printThermalSlip(lotId) {
            const lotInfo = lots.find(l => l.lot_id === lotId);
            if (!lotInfo) return;

            openModal(`
                <div class="p-6 text-center">
                    <span class="text-xs bg-slate-100 font-bold px-3 py-1.5 rounded-full inline-flex items-center gap-1.5 text-slate-700">
                        <i data-lucide="printer" class="w-3.5 h-3.5"></i> จำลองภาพสลิปติดถุง (Thermal 80x80)
                    </span>
                    
                    <div class="bg-white border-2 border-dashed border-slate-300 p-6 my-4 max-w-xs mx-auto text-left shadow-sm">
                        <div class="text-center border-b pb-3 mb-3">
                            <h4 class="font-bold tracking-widest text-lg">RECYCLE METAL</h4>
                            <p class="text-[10px] text-slate-400">YARD LOT IDENTIFICATION SLIP</p>
                        </div>
                        
                        <div class="space-y-1 text-xs">
                            <p><strong>LOT ID:</strong> <span class="font-mono">${lotInfo.lot_id}</span></p>
                            <p><strong>DATE:</strong> ${lotInfo.date}</p>
                            <p><strong>SKU:</strong> ${lotInfo.sku}</p>
                            <p><strong>GRADE:</strong> ${lotInfo.grade}</p>
                            <p class="text-sm border-t pt-2 mt-2"><strong>NET WEIGHT:</strong> <span class="text-base font-black">${lotInfo.net_weight} kg</span></p>
                        </div>
                        
                        <div class="mt-4 pt-3 border-t flex flex-col items-center">
                            <!-- จำลองภาพ QR Code เพื่อสแกนเข้าไปยัง LINE LIFF -->
                            <div class="bg-slate-100 p-2.5 rounded-xl mb-1.5 flex flex-col items-center">
                                <i data-lucide="qr-code" class="w-24 h-24 text-slate-800"></i>
                            </div>
                            <span class="text-[8px] text-center text-slate-400 font-bold">สแกนที่นี่เพื่อส่งหลักฐานเข้า LINE OA</span>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="closeModal()" class="flex-1 bg-slate-800 hover:bg-slate-900 py-3 rounded-xl text-sm font-bold text-white shadow-lg">ปิดหน้าต่างพิมพ์สลิป</button>
                    </div>
                </div>
            `);
        }

        // จำลองขั้นตอนการสแกนผ่าน LINE LIFF (สำหรับ Foreman หน้าลานเพื่อถ่ายรูปตาชั่ง)
        function simulateLineLiffUpload(lotIdNum) {
            const item = lots.find(l => l.id === lotIdNum);
            if (!item) return;

            openModal(`
                <div class="p-6">
                    <div class="bg-emerald-600 text-white p-4 rounded-t-3xl text-center -mx-6 -mt-6">
                        <div class="inline-flex bg-white/10 p-2 rounded-2xl mb-1.5">
                            <i data-lucide="camera" class="w-6 h-6"></i>
                        </div>
                        <h3 class="font-bold text-lg">LINE LIFF EVIDENCE UPLOAD</h3>
                        <p class="text-xs text-emerald-100/90">หลักฐานชั่งน้ำหนักหน้าลาน: ${item.lot_id}</p>
                    </div>

                    <div class="space-y-4 pt-5">
                        <div class="bg-slate-50 border p-4 rounded-2xl space-y-1.5 text-xs text-slate-600">
                            <p><strong>รหัส Lot:</strong> ${item.lot_id}</p>
                            <p><strong>วัสดุ:</strong> ${item.sku} เกรด ${item.grade}</p>
                            <p><strong>น้ำหนักที่ต้องบันทึก:</strong> ${item.net_weight} kg</p>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2">กล้องถ่ายรูป (หลักฐานหน้าจอตาชั่ง)</label>
                            
                            <!-- จำลองช่องพรีวิวกล้องถ่ายรูป -->
                            <div id="camera-simulate" class="bg-slate-900 aspect-video rounded-3xl flex flex-col items-center justify-center text-slate-500 border border-slate-800 overflow-hidden relative">
                                <div class="text-center" id="camera-blank-state">
                                    <i data-lucide="camera-off" class="w-10 h-10 mx-auto mb-2 opacity-50"></i>
                                    <span class="text-xs font-bold">ยังไม่ได้ถ่ายรูปภาพ</span>
                                </div>
                                <img id="uploaded-camera-preview" class="w-full h-full object-cover hidden" src="" />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 pt-2">
                            <!-- จำลองถ่ายรูปจากกล้อง 2 สถานการณ์ -->
                            <button onclick="setMockImage('scale')" class="border bg-white hover:bg-slate-50 text-slate-700 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1">
                                <i data-lucide="scale" class="w-3.5 h-3.5"></i> ถ่ายรูปหน้าตาชั่ง
                            </button>
                            <button onclick="setMockImage('bigbag')" class="border bg-white hover:bg-slate-50 text-slate-700 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1">
                                <i data-lucide="package" class="w-3.5 h-3.5"></i> ถ่ายรูปถุงแพ็ค
                            </button>
                        </div>

                        <div class="flex gap-2 pt-4 border-t">
                            <button onclick="closeModal()" class="flex-1 border-2 py-3 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">ปิดหน้านี้</button>
                            <button onclick="saveEvidenceUrl(${item.id})" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl text-sm font-bold text-white shadow-lg shadow-emerald-500/10">ส่งหลักฐาน (เข้า Google Drive)</button>
                        </div>
                    </div>
                </div>
            `);
        }

        let selectedMockUrl = '';

        function setMockImage(type) {
            const preview = document.getElementById('uploaded-camera-preview');
            const blankState = document.getElementById('camera-blank-state');
            
            let url = 'https://via.placeholder.com/600x400?text=Scale+Evidence+Photo';
            if (type === 'scale') {
                url = 'https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?auto=format&fit=crop&q=80&w=400';
            } else if (type === 'bigbag') {
                url = 'https://images.unsplash.com/photo-1532601224476-15c79f2f7a51?auto=format&fit=crop&q=80&w=400';
            }

            preview.src = url;
            preview.classList.remove('hidden');
            blankState.classList.add('hidden');
            selectedMockUrl = url;
            showToast("ถ่ายภาพสำเร็จ", "พร้อมบันทึกเป็นหลักฐานทางกฎหมาย", "success");
        }

        async function saveEvidenceUrl(id) {
            if (!selectedMockUrl) {
                showToast("ยังไม่มีรูปถ่าย", "กรุณากดจำลองปุ่มถ่ายรูปสินค้าก่อนเซฟส่งข้อมูล", "error");
                return;
            }

            const itemIndex = lots.findIndex(l => l.id === id);
            if (itemIndex > -1) {
                lots[itemIndex].evidence_url = selectedMockUrl;
                
                if (supabaseClientReady) {
                    try {
                        await supabase
                            .from('packed_lots')
                            .update({ evidence_url: selectedMockUrl })
                            .eq('id', id);
                    } catch(e) {
                        console.log("บันทึกรูปขึ้น Supabase ไม่สำเร็จ (Demo Mode Active)");
                    }
                }

                logActivity('UPLOAD_EVIDENCE', `อัปโหลดหลักฐานรูปภาพของ Lot ${lots[itemIndex].lot_id} ไปยัง Google Drive แล้ว`);
                showToast("อัปโหลดสำเร็จ", `บันทึกรูปถ่ายเข้า Lot ${lots[itemIndex].lot_id} ลงระบบความปลอดภัยเรียบร้อย`, "success");
                closeModal();
                render();
            }
        }

        // ระบบฉลาดในการตรวจจับตัวยิงบาร์โค้ด
        async function handleScan(e) {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (!val) return;

                // Smart Scan: กรณีพนักงานเผลอสแกนติด LINE LIFF URL ยาวๆ
                // ดึงพารามิเตอร์รหัส Lot ออกมาด้วย Regex คลุมความปลอดภัย
                const urlMatch = val.match(/[?&]id=([^&]+)/) || val.match(/[?&]lot_id=([^&]+)/);
                const lotId = urlMatch ? urlMatch[1] : val;

                const targetLotIndex = lots.findIndex(l => l.lot_id === lotId);

                if (targetLotIndex > -1) {
                    const lot = lots[targetLotIndex];
                    if (lot.status === 'Shipped') {
                        showToast("สินค้านี้ถูกตัดจ่ายไปแล้ว", `Lot ID: ${lotId} บันทึกการส่งส่งของตั้งแต่ก่อนหน้านี้แล้ว`, "warning");
                        e.target.value = '';
                        return;
                    }

                    // ปรับปรุงสถานะในระบบ
                    lots[targetLotIndex].status = 'Shipped';

                    // สับเปลี่ยนสถานะพาเลท/ถุงสินทรัพย์เป็นส่งให้ลูกค้า
                    const pkgType = lot.package_type;
                    const assetIndex = pkgType === 'ถุง Big Bag' ? 1 : 0;
                    if (assets[assetIndex].in_use_qty > 0) {
                        assets[assetIndex].in_use_qty--;
                        assets[assetIndex].at_customer_qty++;
                    }

                    if (supabaseClientReady) {
                        try {
                            await supabase
                                .from('packed_lots')
                                .update({ status: 'Shipped' })
                                .eq('lot_id', lotId);
                        } catch(err) {
                            console.warn("ไม่สามารถอัปเดตสถานะบน Supabase Server จริงได้เนื่องจากสิทธิ์การเขียนถูกปิด");
                        }
                    }

                    logActivity('SHIP_LOT', `ทำการสแกนส่งออก ตัดสต๊อก Lot ${lotId} คลุมสินค้าขึ้นรถบรรทุก`);
                    showToast("ตัดจ่ายสินค้าสำเร็จ", `รหัส Lot: ${lotId} เปลี่ยนสถานะเป็น Shipped และเคลื่อนย้ายพาเลทออกไปแล้ว`, "success");
                    e.target.value = '';
                    fetchData();
                } else {
                    showToast("ไม่พบรหัสสินค้า", `ตรวจไม่พบรหัส Lot "${lotId}" ภายในลานเก็บในขณะนี้`, "error");
                    e.target.value = '';
                }
            }
        }

        // อัปเดตเวลาบนหัวเว็บไซค์
        setInterval(() => {
            const display = document.getElementById('current-time-display');
            if (display) {
                const d = new Date();
                display.innerText = d.toLocaleDateString('th-TH') + ' ' + d.toLocaleTimeString('th-TH') + ' น.';
            }
        }, 1000);

        // โหลดข้อมูลทันทีที่เปิดหน้าเว็บขึ้นมา
        window.onload = function() {
            fetchData();
        }
    </script>
</body>
</html>
